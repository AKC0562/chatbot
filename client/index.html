<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Advanced AI Chatbot</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="header-info">
                <div class="avatar">
                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                        <circle cx="12" cy="5" r="2"></circle>
                        <path d="M12 7v4"></path>
                        <line x1="8" y1="16" x2="8" y2="16"></line>
                        <line x1="16" y1="16" x2="16" y2="16"></line>
                    </svg>
                </div>
                <div class="header-text">
                    <h1>Nexus AI</h1>
                    <span class="status">
                        <span class="status-dot"></span> Online
                    </span>
                    <span class="badge">Advanced NLP Engine</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="debug-btn" title="Debug Console" type="button">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 18 22 12 16 6"></polyline>
                        <polyline points="8 6 2 12 8 18"></polyline>
                    </svg>
                </button>
                <button class="icon-btn" id="reset-btn" title="Reset Chat" type="button">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M2.5 22v-6h6"></path>
                        <path d="M2 11.5a10 10 0 0 1 18.8-4.3"></path>
                        <path d="M22 4.5a10 10 0 0 1-18.8 4.3"></path>
                    </svg>
                </button>
                <button class="icon-btn" id="menu-btn" title="Options" type="button">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
                </button>
            </div>
        </header>

        <main class="chat-box" id="chat-box">
            <div class="message bot-message">
                <div class="message-content">
                    Hello! I'm Nexus, an advanced AI assistant powered by NLP. I can help you with general questions, provide insights, and engage in meaningful conversations.
                </div>
                <div class="message-meta" style="margin-top: 8px; font-size: 11px; opacity: 0.5;">
                    💡 Tip: Open the debug console (🔧) to see intent recognition and conversation analytics
                </div>
            </div>
        </main>

        <footer class="chat-input-container">
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Ask me anything..." autocomplete="off" required>
                <button type="submit" id="send-btn" aria-label="Send message">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>
    </div>

    <!-- Debug Panel -->
    <div id="debug-panel" class="debug-panel hidden">
        <div class="debug-header">
            <h3>Debug Console</h3>
            <button class="close-btn" id="close-debug">&times;</button>
        </div>
        <div class="debug-content">
            <div class="debug-section">
                <button class="debug-btn" id="show-history"> Show History</button>
                <button class="debug-btn" id="show-summary"> Show Summary</button>
                <button class="debug-btn" id="show-intents"> List Intents</button>
                <button class="debug-btn" id="clear-logs"> Clear Logs</button>
            </div>
            <div id="debug-logs" class="debug-logs"></div>
        </div>
    </div>

    <script src="index.js"></script>
    <script src="debug.js"></script>
</body>
</html>
